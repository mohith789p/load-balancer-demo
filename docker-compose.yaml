# version: '3.1'

services:

  node-server:
    build: ./node-server
    restart: always
    environment:
      PORT: 3000
    ports:
      - "7071:3000"

  python-server:
    build: ./python-server
    restart: always
    environment:
      PORT: 5000
    ports:
      - "7072:5000"

  spring-server:
    build: ./spring_server
    restart: always
    environment:
      PORT: 8080
    ports:
      - "7073:8080"

  loadbalancer:
    image: nginx:alpine
    restart: always
    ports:
      - 9000:80
    depends_on:
      - node-server
      - python-server
      - spring-server
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf